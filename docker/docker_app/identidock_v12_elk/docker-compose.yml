version: '3'
services:

  identiproxy:
    build: ./identiproxy/
    container_name: identiproxy
    ports:
      - "80:80"
    links:
      - "identidock"

  identidock:
    build: ./identidock/
    container_name: identidock
    environment:
      RUN: PROD
    volumes:
      - ./identidock/app:/app
    links:
      - "dnmonster"
      - "redis"

  dnmonster:
    image: amouat/dnmonster:1.0
    container_name: identidnmonster

  redis:
    image: redis:3.0
    container_name: identiredis

  logspout:
    image: amouat/logspout-logstash:1.0
    container_name: identilogspout
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:80"
    links:
      - "logstash"
    command: logstash://logstash:5000

  logstash:
    image: logstash:6.8.6
    container_name: identilogstash
    volumes:
      - ./identilogs/logstash.conf:/etc/logstash.conf
    environment:
      LOGSPUT: ignore
    command: -f /etc/logstash.conf
